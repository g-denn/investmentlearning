<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="VIC Analytics Dashboard - A cleaner way to explore historical investment ideas, theses, and performance." />
    <title>VIC Analytics | Research Historical Investment Ideas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --bg-alt: #efe9df;
        --surface: #fbf8f2;
        --surface-strong: #ffffff;
        --surface-tint: #f1ebe2;
        --text: #12110f;
        --text-soft: #6e665c;
        --text-muted: #958c80;
        --line: #ddd4c7;
        --line-strong: #cbc0b0;
        --accent: #6bcfbe;
        --accent-blue: #7f9df5;
        --gradient: linear-gradient(135deg, #6bcfbe 0%, #7f9df5 100%);
      }
      body {
        background:
          radial-gradient(circle at top, rgba(107, 207, 190, 0.2), transparent 30%),
          radial-gradient(circle at 85% 15%, rgba(127, 157, 245, 0.16), transparent 24%),
          linear-gradient(180deg, #f8f4ec 0%, #f3ede3 100%);
        color: var(--text);
        font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        letter-spacing: -0.015em;
      }
      a { color: inherit; text-decoration: none; }
      button { font-family: inherit; cursor: pointer; }
      img { display: block; max-width: 100%; }
      input, button, select, textarea { font: inherit; }
      ::selection { background: rgba(127, 157, 245, 0.24); color: var(--text); }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: rgba(18, 17, 15, 0.04); }
      ::-webkit-scrollbar-thumb { background: rgba(18, 17, 15, 0.18); border-radius: 999px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(18, 17, 15, 0.3); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
